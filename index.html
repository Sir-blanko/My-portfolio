<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antony Kagwanja | STEM Tutor, Writer & Developer</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap">
  <link rel="canonical" href="https://antony-kagwanja.vercel.app">
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Antony Kagwanja - STEM tutor, academic writer and developer offering online lessons in Mathematics, Computer Studies, Physics and Geography, plus high-quality digital content creation services.">
  <meta name="keywords" content="online tutor, mathematics tutor, physics tutor, computer studies tutor, geography tutor, academic writer, content writer, web developer, Kenya tutor">
  <meta name="author" content="Antony Kagwanja">
  <meta property="og:title" content="Antony Kagwanja - Full-Stack Developer & UI/UX Designer">
  <meta property="og:description" content="Crafting digital experiences that blend beautiful design with robust functionality">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://antony-kagwanja.vercel.app">
  
  <style>
    /* CSS Variables */
    :root {
      --primary: #38bdf8;
      --primary-dark: #0ea5e9;
      --secondary: #f97316;
      --accent: #22c55e;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --gray-light: #cbd5e1;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      
      --gradient-primary: linear-gradient(135deg, #38bdf8 0%, #f97316 100%);
      --gradient-dark: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --gradient-accent: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-primary: 0 10px 30px -5px rgba(37, 99, 235, 0.3);
      
      --border-radius: 12px;
      --border-radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Animations */
    @keyframes backgroundGlow {
      from {
        opacity: 0.9;
      }
      to {
        opacity: 0.6;
      }
    }
    
    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--dark);
      color: var(--light);
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 20%, rgba(37,99,235,0.16), transparent 55%),
        radial-gradient(circle at 80% 0%, rgba(124,58,237,0.16), transparent 55%),
        radial-gradient(circle at 50% 100%, rgba(6,182,212,0.16), transparent 55%);
      opacity: 0.9;
      z-index: -1;
      animation: backgroundGlow 22s ease-in-out infinite alternate;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    section {
      padding: 100px 0;
    }
    
    h1, h2, h3, h4 {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    
    h1 {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
    }
    
    h2 {
      font-size: 2.5rem;
      margin-bottom: 3rem;
      position: relative;
      display: inline-block;
    }
    
    h2:after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 60px;
      height: 4px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }
    
    h3 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    
    p {
      font-size: 1.125rem;
      color: var(--gray-light);
      margin-bottom: 1.5rem;
    }
    
    a {
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
    }
    
    ul {
      list-style: none;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      font-weight: 600;
      font-size: 1rem;
      border-radius: var(--border-radius);
      border: none;
      cursor: pointer;
      transition: var(--transition);
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: var(--shadow-primary);
    }
    
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px -5px rgba(37, 99, 235, 0.4);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--light);
      border: 2px solid var(--gray);
    }
    
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .btn-lg {
      padding: 16px 40px;
      font-size: 1.125rem;
    }
    
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    
    .section-title h2:after {
      left: 50%;
      transform: translateX(-50%);
    }
    
    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 24px 0;
      transition: var(--transition);
    }
    
    nav.scrolled {
      background-color: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 0;
      box-shadow: var(--shadow-lg);
    }
    
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.75rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-links {
      display: flex;
      gap: 40px;
    }
    
    .nav-links a {
      font-weight: 500;
      position: relative;
    }
    
    .nav-links a:after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gradient-primary);
      transition: width 0.3s ease;
    }
    
    .nav-links a:hover:after,
    .nav-links a.active:after {
      width: 100%;
    }
    
    .nav-links a:hover {
      color: var(--primary);
    }
    
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--light);
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    /* Hero Section */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 100px;
      position: relative;
      overflow: hidden;
    }
    
    .hero-content {
      max-width: 700px;
      z-index: 2;
      position: relative;
      animation: floatIn 1s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .hero-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.3);
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 24px;
    }
    
    .hero-title {
      font-size: 4rem;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    
    .hero-title span {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero-description {
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
      max-width: 600px;
    }
    
    .hero-btns {
      display: flex;
      gap: 16px;
      margin-bottom: 3rem;
    }
    
    .hero-stats {
      display: flex;
      gap: 40px;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stat-label {
      font-size: 0.875rem;
      color: var(--gray);
    }
    
    .hero-blur {
      position: absolute;
      top: -80px;
      right: -40px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle at 30% 20%, rgba(37,99,235,0.9), transparent 60%);
      filter: blur(120px);
      opacity: 0.45;
      z-index: 1;
    }
    
    /* Pinterest Slideshow Container */
    #motivation-slider {
      max-width: 300px;
      margin: 40px auto;
      overflow: hidden;
      position: relative;
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-xl);
      background: var(--dark-light);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .pin-wrapper {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    
    .pin-wrapper iframe {
      flex: 0 0 100%;
      border: none;
    }
    
    /* Projects Section */
    #projects {
      background: var(--dark-light);
    }
    
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }
    
    .project-card {
      background: var(--dark);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      transition: var(--transition);
      box-shadow: var(--shadow-lg);
    }
    
    .project-card:hover {
      transform: translateY(-10px);
      box-shadow: var(--shadow-xl);
    }
    
    .project-img {
      height: 220px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 3.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .project-img:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--gradient-primary);
      opacity: 0;
      transition: var(--transition);
    }
    
    .project-card:hover .project-img:before {
      opacity: 0.1;
    }
    
    .project-content {
      padding: 30px;
    }
    
    .project-title {
      font-size: 1.5rem;
      margin-bottom: 12px;
    }
    
    .project-desc {
      font-size: 1rem;
      margin-bottom: 20px;
    }
    
    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .tech-tag {
      padding: 6px 12px;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
    }
    
    .project-links {
      display: flex;
      gap: 16px;
    }
    
    .project-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-light);
    }
    
    .project-link:hover {
      color: var(--primary);
    }
    
    .project-real-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: 0.3s ease;
    }

    .project-card:hover .project-real-img {
      transform: scale(1.05);
    }
    
    /* About Section */
    .about-content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 60px;
      align-items: center;
    }
    
    .about-img {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .avatar {
      width: 100%;
      max-width: 360px;
      height: 360px;
      border-radius: 999px;
      box-shadow: var(--shadow-xl);
      position: relative;
      z-index: 2;
      object-fit: cover;
      background: radial-gradient(circle at 30% 0%, #1e293b, #020617);
    }
    
    .about-img:before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      width: 90%;
      height: 90%;
      border: 2px dashed rgba(148,163,184,0.7);
      border-radius: 999px;
      z-index: 1;
    }
    
    .about-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }
    
    .skill-tag {
      padding: 10px 20px;
      background: rgba(37, 99, 235, 0.1);
      border-radius: var(--border-radius);
      font-weight: 600;
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.2);
    }
    
    /* Skills Section */
    #skills {
      background: var(--dark-light);
    }
    
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 40px;
    }
    
    .skill-category {
      background: var(--dark);
      padding: 30px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-md);
      transition: var(--transition);
    }
    
    .skill-category:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    
    .skill-category h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: var(--primary);
    }
    
    .skill-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: var(--gray-light);
    }
    
    .skill-list li:before {
      content: '▸';
      color: var(--primary);
      font-weight: bold;
    }
    
    /* Contact Section */
    #contact {
      text-align: center;
    }
    
    .contact-description {
      max-width: 700px;
      margin: 0 auto 60px;
      text-align: left;
    }
    
    .contact-form {
      max-width: 600px;
      margin: 0 auto 60px;
      text-align: left;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--light);
    }
    
    .form-control {
      width: 100%;
      padding: 16px;
      background: var(--dark-light);
      border: 2px solid var(--gray);
      border-radius: var(--border-radius);
      color: var(--light);
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    textarea.form-control {
      min-height: 150px;
      resize: vertical;
    }
    
    .contact-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .contact-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: var(--dark-light);
      border-radius: var(--border-radius);
      width: 120px;
      transition: var(--transition);
    }
    
    .contact-link:hover {
      background: var(--dark);
      transform: translateY(-5px);
    }
    
    .contact-icon {
      font-size: 2rem;
      color: var(--primary);
    }
    
    .contact-link span {
      font-size: 0.875rem;
      font-weight: 500;
    }

    /* Testimonials */
    #testimonials {
      background: radial-gradient(circle at top right, rgba(34,197,94,0.16), transparent 55%);
    }

    .testimonials-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 26px 24px;
      border-radius: var(--border-radius-lg);
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.4);
      box-shadow: var(--shadow-lg);
    }

    .rating-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(22,163,74,0.16);
      border: 1px solid rgba(34,197,94,0.7);
      color: var(--success);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .rating-pill i {
      color: #facc15;
    }

    .testimonials-quote {
      flex: 1.5;
      font-size: 1rem;
      color: var(--gray-light);
    }

    .testimonials-quote strong {
      color: var(--light);
    }

    .testimonials-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--gray);
    }

    .testimonials-mini span {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.45);
    }

    /* Services Section */
    #services {
      background: radial-gradient(circle at top left, rgba(37,99,235,0.14), transparent 55%);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
      margin-top: 2rem;
    }

    .service-card {
      background: rgba(15,23,42,0.9);
      border-radius: var(--border-radius-lg);
      padding: 26px 24px 24px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      transition: transform .35s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow .35s ease, border-color .35s ease;
    }

    .service-card::before {
      content: '';
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, rgba(96,165,250,0.35), transparent 40%, transparent 60%, rgba(52,211,153,0.4));
      opacity: 0;
      transition: opacity .35s ease;
      pointer-events: none;
    }

    .service-card:hover::before {
      opacity: 0.9;
    }

    .service-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: var(--shadow-xl);
      border-color: rgba(96,165,250,0.6);
    }

    .service-icon {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(96,165,250,0.6);
      color: var(--accent);
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .service-title {
      font-size: 1.25rem;
      margin-bottom: .35rem;
      position: relative;
      z-index: 1;
    }

    .service-meta {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--gray);
      margin-bottom: .9rem;
      position: relative;
      z-index: 1;
    }

    .service-card p {
      font-size: 0.98rem;
      margin-bottom: .9rem;
      position: relative;
      z-index: 1;
    }

    .service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .service-tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.5);
      font-size: 0.75rem;
      color: var(--gray-light);
    }
    
    /* Footer */
    footer {
      background: var(--dark-light);
      padding: 60px 0 30px;
      text-align: center;
    }
    
    .footer-logo {
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 40px;
    }
    
    .footer-links a {
      color: var(--gray-light);
      font-weight: 500;
    }
    
    .footer-links a:hover {
      color: var(--primary);
    }
    
    .copyright {
      color: var(--gray);
      font-size: 0.875rem;
      padding-top: 30px;
      border-top: 1px solid rgba(100, 116, 139, 0.2);
    }
    
    /* Responsive Design */
    @media (max-width: 992px) {
      h1 {
        font-size: 3rem;
      }
      
      h2 {
        font-size: 2.25rem;
      }
      
      .hero-title {
        font-size: 3.5rem;
      }
      
      .about-content {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      
      .about-img {
        max-width: 400px;
        margin: 0 auto;
      }
    }
    
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: block;
      }
      
      .nav-links {
        position: fixed;
        top: 80px;
        left: 0;
        width: 100%;
        background: var(--dark);
        flex-direction: column;
        padding: 30px;
        gap: 20px;
        transform: translateY(-100%);
        opacity: 0;
        visibility: hidden;
        transition: var(--transition);
        box-shadow: var(--shadow-lg);
        z-index: 999;
      }
      
      .nav-links.active {

        visibility: visible;

      .hero-title {

      .hero-btns {

      .hero-stats {

      .project-grid {

      .skills-grid {

      .footer-links {

        gap: 20px;

      .contact-links {
        gap: 15px;
      }
      
      .contact-link {

        padding: 15px;
      }

    @media (max-width: 480px) {
      h1 {

</head>
<body>
  <!-- Navigation will go here -->
  <nav>
    <div class="container">
      <div class="nav-container">
        <div class="logo">AK</div>
        <div class="nav-links">
          <a href="#hero">Home</a>
          <a href="#about">About</a>
          <a href="#services">Services</a>
          <a href="#projects">Projects</a>
          <a href="#skills">Skills</a>
          <a href="#contact">Contact</a>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Add remaining HTML sections here -->

  <script>
    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.querySelector('.nav-links');
    
    mobileMenuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });
    
    // Close menu when link is clicked
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
      });
    });
    
    // Scroll effect for navbar
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      if (window.scrollY > 100) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
